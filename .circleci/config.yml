version: 2.1

orbs:
  android: circleci/android@3.1.0

references:
  workspace: &workspace
    .

  executor: &executor
    name: android/android_machine
    tag: default

  ## Cache
  gradle_key: &gradle_key
    jars-{{ checksum "build.gradle.kts" }}-{{ checksum "verify_sna/build.gradle.kts"}}

  restore_gradle_cache: &restore_gradle_cache
    restore_cache:
      key: *gradle_key

  save_gradle_cache: &save_gradle_cache
    save_cache:
      key: *gradle_key
      paths:
        - ~/.gradle

commands:
  move_directory:
    parameters:
      from:
        description: Directory to move
        type: string
      to:
        description: Destination directory
        type: string
    steps:
      - run: cp -R <<parameters.from>> <<parameters.to>>

jobs:
  assemble:
    executor: *executor
    steps:
      - checkout
      - *restore_gradle_cache
      - run:
          name: Assembling the project
          command: ./gradlew assemble --no-daemon
      - *save_gradle_cache

  unit_tests:
    executor: *executor
    steps:
      - checkout
      - *restore_gradle_cache
      - run:
          name: Running Unit Tests
          command: ./gradlew verify_sna:test --no-daemon
      - *save_gradle_cache
  
  ktlint_check:
    executor: *executor
    steps:
      - checkout
      - *restore_gradle_cache
      - run:
          name: Running Ktlint
          command: ./gradlew ktlintCheck
      - *save_gradle_cache

  size_report:
    executor: *executor
    steps:
      - checkout
      - *restore_gradle_cache
      - run:
          name: Generating Size Report
          command: ./gradlew :verify_sna:generateSizeReport
      - *save_gradle_cache
      - store_artifacts:
          path: "verify_sna/build/outputs/sizeReport"
          destination: sizeReport
      - run: mkdir -p builds
      - move_directory:
          from: verify_sna/build/outputs/sizeReport/
          to: builds
      - persist_to_workspace:
          root: *workspace
          paths:
            - builds

workflows:
  workflow:
    jobs:
      - assemble
      - ktlint_check:
            requires:
                - assemble
      - unit_tests:
          requires:
            - ktlint_check
      - size_report:
          requires:
            - unit_tests
